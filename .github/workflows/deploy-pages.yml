# Publica la web (frontend/dist) en GitHub Pages.
# Configura en el repo: Settings → Secrets and variables → Actions → Variables
#   VITE_API_BASE = https://tu-api-publica (Cloudflare Tunnel, etc.)
#   VITE_BASE     = /nombre-del-repo/   (ej. /SmartRoots/ — con barras)

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar y compilar frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_BASE: ${{ vars.VITE_BASE || format('/{0}/', github.event.repository.name) }}
        run: |
          npm ci
          npm run build:pages

      - name: Subir artefacto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
